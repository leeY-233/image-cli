<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gpt-image-2 Web Service</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f2f4f7;
        color: #172033;
      }
      * { box-sizing: border-box; }
      body { margin: 0; height: 100vh; overflow: hidden; background: #f2f4f7; }
      button, textarea, input, select { font: inherit; }
      main {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        overflow: hidden;
      }
      aside {
        height: 100vh;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 22px;
        background: #fbfcfe;
        border-right: 1px solid #d8dee9;
      }
      .brand {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }
      h1 { margin: 0; font-size: 25px; line-height: 1.08; letter-spacing: 0; }
      .model {
        width: fit-content;
        margin: 0;
        border: 1px solid #d8dee9;
        border-radius: 999px;
        background: #ffffff;
        color: #566176;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      form {
        min-height: 0;
        flex: 1;
        display: grid;
        grid-template-rows: minmax(220px, 1fr) auto auto;
        gap: 12px;
        align-content: stretch;
      }
      .field { display: grid; gap: 9px; color: #344054; font-size: 13px; font-weight: 800; }
      textarea, input[type="number"], select {
        width: 100%;
        border: 1px solid #c9d2df;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
        padding: 11px 12px;
        outline: none;
      }
      textarea {
        min-height: 0;
        height: 100%;
        resize: none;
        line-height: 1.5;
      }
      textarea:focus, input[type="number"]:focus, select:focus {
        border-color: #1d5fd7;
        box-shadow: 0 0 0 3px rgba(29, 95, 215, 0.12);
      }
      select {
        min-height: 46px;
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, #647086 50%),
          linear-gradient(135deg, #647086 50%, transparent 50%);
        background-position:
          calc(100% - 18px) 19px,
          calc(100% - 12px) 19px;
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
        cursor: pointer;
      }
      .prompt-field {
        min-height: 0;
        grid-template-rows: auto minmax(0, 1fr);
        align-content: stretch;
        gap: 7px;
      }
      .fields { min-height: 0; display: grid; gap: 12px; }
      .field-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
      .count-field input { max-width: 140px; }
      .segmented {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .segmented.ratio { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .segmented.quality { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .choice input { position: absolute; opacity: 0; pointer-events: none; }
      .choice span {
        min-height: 52px;
        display: grid;
        gap: 5px;
        place-items: center;
        border: 1px solid #c9d2df;
        border-radius: 8px;
        background: #ffffff;
        color: #46536a;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.25;
        text-align: center;
        cursor: pointer;
        user-select: none;
      }
      .ratio .choice span {
        min-height: 70px;
        grid-template-rows: 24px auto auto;
        padding: 6px;
      }
      .ratio-shape {
        display: block;
        width: min(42px, 80%);
        height: 24px;
        border: 2px solid currentColor;
        border-radius: 4px;
        background: rgba(70, 83, 106, 0.08);
      }
      .ratio-shape.ratio-1-1 { width: 24px; }
      .ratio-shape.ratio-3-4 { width: 18px; }
      .ratio-shape.ratio-4-3 { width: 32px; }
      .ratio-shape.ratio-9-16 { width: 14px; }
      .ratio-shape.ratio-16-9 { width: 42px; }
      .ratio-shape.ratio-21-9 { width: 54px; max-width: 88%; }
      .choice strong {
        display: block;
        font-size: 13px;
        line-height: 1;
      }
      .choice small {
        display: block;
        color: #647086;
        font-size: 10px;
        font-weight: 800;
        line-height: 1;
      }
      .choice { position: relative; }
      .choice-tip {
        display: none;
      }
      #sizeTooltip {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 50;
        width: min(260px, 72vw);
        border: 1px solid #c9d2df;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 32px rgba(22, 41, 69, 0.14);
        color: #344054;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.45;
        padding: 10px 11px;
        pointer-events: none;
      }
      #sizeTooltip[hidden] { display: none; }
      #sizeTooltip::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 100%;
        width: 10px;
        height: 10px;
        transform: translate(-50%, -5px) rotate(45deg);
        border-bottom: 1px solid #c9d2df;
        border-right: 1px solid #c9d2df;
        background: #ffffff;
      }
      .choice input:checked + span {
        border-color: #1d5fd7;
        background: #e8f0ff;
        color: #123f91;
      }
      .choice input:focus-visible + span {
        box-shadow: 0 0 0 3px rgba(29, 95, 215, 0.16);
      }
      button {
        min-height: 46px;
        cursor: pointer;
        border: 0;
        border-radius: 8px;
        background: #165dcc;
        color: #ffffff;
        font-weight: 800;
      }
      button:hover:not(:disabled) { background: #104fae; }
      button:disabled { cursor: wait; opacity: 0.68; }
      .workspace {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) 260px;
        gap: 16px;
        padding: 26px;
        overflow: hidden;
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .toolbar h2 { margin: 0; font-size: 20px; line-height: 1.2; }
      .toolbar-actions { position: relative; display: flex; align-items: center; gap: 10px; }
      .logout {
        color: #566176;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }
      .logout:hover { color: #165dcc; }
      #status {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        border: 1px solid #d8dee9;
        border-radius: 999px;
        background: #ffffff;
        color: #566176;
        padding: 6px 11px;
        font-size: 13px;
        font-weight: 700;
        text-align: right;
        white-space: pre-wrap;
      }
      button#status {
        cursor: pointer;
        line-height: 1.2;
      }
      button#status:hover,
      button#status:focus {
        border-color: #aeb9c9;
        background: #f7f8fa;
        color: #172033;
        outline: none;
      }
      .job-popover[hidden] { display: none; }
      .job-popover {
        position: absolute;
        right: 44px;
        top: calc(100% + 10px);
        z-index: 30;
        width: min(430px, calc(100vw - 48px));
        max-height: min(520px, calc(100vh - 120px));
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid #c9d2df;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 44px rgba(22, 41, 69, 0.16);
        overflow: hidden;
      }
      .job-popover-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #e5eaf1;
        padding: 12px 14px;
      }
      .job-popover-head strong { font-size: 14px; }
      .job-list {
        min-height: 0;
        display: grid;
        gap: 8px;
        overflow-y: auto;
        padding: 10px;
      }
      .job-row {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
        padding: 10px;
        text-align: left;
        cursor: pointer;
      }
      .job-row:hover,
      .job-row:focus,
      .job-row:active {
        border-color: #aeb9c9;
        background: #f7f8fa;
        color: #172033;
        outline: none;
      }
      .job-row-meta { min-width: 0; display: grid; gap: 5px; }
      .job-row-side { display: flex; align-items: center; gap: 8px; }
      .job-row-status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 66px;
        border: 1px solid #c9d2df;
        border-radius: 999px;
        color: #344054;
        background: #ffffff;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 800;
      }
      .job-row-cancel {
        width: 28px;
        height: 28px;
        min-height: 28px;
        display: inline-grid;
        place-items: center;
        border: 1px solid #fecaca;
        border-radius: 999px;
        background: #ffffff;
        color: #b91c1c;
        font-size: 18px;
        font-weight: 900;
        line-height: 1;
        padding: 0;
      }
      button.job-row-cancel:hover:not(:disabled),
      button.job-row-cancel:focus:not(:disabled),
      button.job-row-cancel:active:not(:disabled) {
        border-color: #fca5a5;
        background: #fff1f2;
        color: #991b1b;
        outline: none;
      }
      #result {
        height: 100%;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr;
        align-content: stretch;
        gap: 16px;
      }
      .panel {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
      }
      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .panel-title h3 { margin: 0; font-size: 15px; line-height: 1.2; }
      .panel-actions { display: flex; align-items: center; gap: 8px; }
      #history {
        min-height: 0;
        max-height: none;
        display: grid;
        align-content: start;
        gap: 8px;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 4px;
      }
      .history-item {
        width: 100%;
        height: 74px;
        position: relative;
        appearance: none;
        -webkit-appearance: none;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
        color: inherit;
        padding: 7px;
        text-align: left;
      }
      .selecting .history-item { grid-template-columns: auto minmax(0, 1fr) auto; }
      .history-check {
        display: none;
        width: 18px;
        height: 18px;
        accent-color: #64748b;
      }
      .selecting .history-check { display: block; }
      .history-item::before {
        content: "";
        position: absolute;
        inset: 8px auto 8px 0;
        width: 3px;
        border-radius: 999px;
        background: transparent;
      }
      .history-item:hover:not(:disabled),
      .history-item:focus:not(:disabled),
      .history-item:active:not(:disabled) {
        border-color: #aeb9c9;
        background: #f7f8fa;
        color: inherit;
        box-shadow: 0 6px 18px rgba(22, 41, 69, 0.05);
        outline: none;
      }
      .history-item:hover::before,
      .history-item:focus::before { background: #94a3b8; }
      .history-meta { min-width: 0; display: grid; gap: 3px; }
      .prompt-line {
        color: #344054;
        min-width: 0;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.45;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .muted { color: #647086; font-size: 12px; }
      .view-pill {
        border: 1px solid #c9d2df;
        border-radius: 999px;
        background: #ffffff;
        color: #344054;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
      }
      .history-item:hover .view-pill {
        border-color: #94a3b8;
        background: #ffffff;
        color: #172033;
      }
      .empty {
        min-height: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        border: 1px dashed #b7c0cf;
        border-radius: 8px;
        color: #566176;
        background: #ffffff;
        text-align: center;
        padding: 24px;
      }
      .loader {
        display: grid;
        justify-items: center;
        gap: 12px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #d8dee9;
        border-top-color: #165dcc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      figure {
        min-width: 0;
        min-height: 0;
        margin: 0;
        display: grid;
        gap: 10px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }
      .result-card {
        height: 100%;
        min-height: 0;
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: hidden;
      }
      figure img {
        width: 100%;
        height: 100%;
        min-height: 0;
        max-height: none;
        object-fit: contain;
        border-radius: 6px;
        background: #eef2f7;
      }
      figcaption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: #647086;
        font-size: 13px;
      }
      .actions { display: flex; gap: 10px; align-items: center; }
      figcaption a { color: #165dcc; font-weight: 800; text-decoration: none; }
      figcaption a:hover { text-decoration: underline; }
      .text-action {
        border: 0;
        background: transparent;
        color: #165dcc;
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        padding: 0;
      }
      .text-action:hover { text-decoration: underline; }
      .error {
        grid-column: 1 / -1;
        white-space: pre-wrap;
        border: 1px solid #fecaca;
        border-radius: 8px;
        background: #fff1f2;
        color: #9f1239;
        padding: 14px;
      }
      .modal[hidden] { display: none; }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        height: 100vh;
        max-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(360px, 30vw, 520px);
        align-items: stretch;
        gap: 0;
        background: rgba(15, 23, 42, 0.72);
        padding: 28px;
        overflow: hidden;
      }
      .modal-image {
        position: relative;
        min-width: 0;
        min-height: 0;
        height: calc(100vh - 56px);
        border-radius: 8px 0 0 8px;
        background: #0f172a;
        padding: 18px;
        overflow: hidden;
      }
      .modal-image img {
        position: absolute;
        inset: 18px;
        display: block;
        width: calc(100% - 36px);
        height: calc(100% - 36px);
        max-width: none;
        max-height: none;
        object-fit: contain;
        object-position: center center;
      }
      .modal-info {
        min-width: 0;
        min-height: 0;
        height: calc(100vh - 56px);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        gap: 14px;
        border-radius: 0 8px 8px 0;
        background: #ffffff;
        padding: 18px;
        overflow: hidden;
      }
      .modal-info .toolbar { min-height: 0; }
      .modal-info h3 { margin: 0; font-size: 18px; }
      .modal-prompt {
        min-height: 0;
        max-height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #f8fafc;
        color: #172033;
        padding: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .pill-action {
        min-height: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #c9d2df;
        border-radius: 999px;
        background: #ffffff;
        color: #344054;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        line-height: 1;
        padding: 9px 12px;
        text-decoration: none;
      }
      .pill-action[hidden],
      button[hidden] {
        display: none;
      }
      .pill-action:hover,
      .pill-action:focus,
      .pill-action:active,
      button.pill-action:hover:not(:disabled),
      button.pill-action:focus:not(:disabled),
      button.pill-action:active:not(:disabled) {
        border-color: #94a3b8;
        background: #f7f8fa;
        color: #172033;
        outline: none;
        text-decoration: none;
      }
      .danger-action {
        border-color: #fecaca;
        color: #9f1239;
      }
      .danger-action:hover,
      .danger-action:focus,
      .danger-action:active,
      button.danger-action:hover:not(:disabled),
      button.danger-action:focus:not(:disabled),
      button.danger-action:active:not(:disabled) {
        border-color: #fca5a5;
        background: #fff1f2;
        color: #9f1239;
      }
      .modal-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; min-height: 0; }
      @media (max-width: 820px) {
        body { height: auto; min-height: 100vh; overflow: auto; }
        main { height: auto; min-height: 100vh; grid-template-columns: 1fr; overflow: visible; }
        aside { height: auto; min-height: auto; overflow: auto; border-right: 0; border-bottom: 1px solid #d9e1ee; }
        form { display: grid; grid-template-rows: none; }
        textarea { min-height: 220px; resize: vertical; }
        .workspace { min-height: auto; grid-template-rows: auto minmax(420px, 60vh) auto; }
        .empty { min-height: 320px; }
        .modal { height: 100dvh; max-height: 100dvh; grid-template-columns: 1fr; grid-template-rows: minmax(0, 58vh) minmax(0, 1fr); padding: 14px; }
        .modal-image { height: auto; border-radius: 8px 8px 0 0; }
        .modal-info { height: auto; border-radius: 0 0 8px 8px; }
      }
      @media (max-width: 460px) {
        aside, .workspace { padding: 16px; }
        .field-grid, .segmented, .segmented.quality { grid-template-columns: 1fr; }
        .toolbar { align-items: flex-start; flex-direction: column; }
        #status { text-align: left; }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <div class="brand">
          <h1>gpt-image-2</h1>
          <p class="model">gpt-image-2</p>
        </div>
        <form id="form">
          <label class="field prompt-field">
            Prompt
            <textarea name="prompt" placeholder="输入图片提示词" required></textarea>
          </label>
          <div class="fields">
            <div class="field">
              Ratio
              <div class="segmented ratio" role="radiogroup" aria-label="比例">
                <label class="choice"><input type="radio" name="generate_size" value="1024x1024" data-ratio="1:1" checked><span><i class="ratio-shape ratio-1-1"></i><strong>1:1</strong><small>Square</small></span><em class="choice-tip">常用于头像、图标、产品主图、社媒图片和电商商品图。实际提交尺寸：1024x1024。</em></label>
                <label class="choice"><input type="radio" name="generate_size" value="1536x2048" data-ratio="3:4"><span><i class="ratio-shape ratio-3-4"></i><strong>3:4</strong><small>Portrait</small></span><em class="choice-tip">常用于半身人像、竖版海报、商品详情图和偏自然的竖构图。实际提交尺寸：1536x2048。</em></label>
                <label class="choice"><input type="radio" name="generate_size" value="2048x1536" data-ratio="4:3"><span><i class="ratio-shape ratio-4-3"></i><strong>4:3</strong><small>Classic</small></span><em class="choice-tip">常用于摄影感图片、室内场景、产品横图、文章配图和人物环境照。实际提交尺寸：2048x1536。</em></label>
                <label class="choice"><input type="radio" name="generate_size" value="2160x3840" data-ratio="9:16"><span><i class="ratio-shape ratio-9-16"></i><strong>9:16</strong><small>Story</small></span><em class="choice-tip">常用于手机壁纸、短视频封面、竖屏海报、角色全身图和社媒 story。实际提交尺寸：2160x3840。</em></label>
                <label class="choice"><input type="radio" name="generate_size" value="3840x2160" data-ratio="16:9"><span><i class="ratio-shape ratio-16-9"></i><strong>16:9</strong><small>Wide</small></span><em class="choice-tip">常用于宽屏壁纸、视频封面、横屏场景图、电影感画面、建筑和游戏场景。实际提交尺寸：3840x2160。</em></label>
                <label class="choice"><input type="radio" name="generate_size" value="3360x1440" data-ratio="21:9"><span><i class="ratio-shape ratio-21-9"></i><strong>21:9</strong><small>Cinema</small></span><em class="choice-tip">常用于超宽电影感画面、横向环境叙事、游戏概念图、横幅和桌面宽屏壁纸。实际提交尺寸：3360x1440。</em></label>
              </div>
            </div>
            <div class="field-grid">
              <div class="field">
                Quality
                <div class="segmented quality" role="radiogroup" aria-label="质量">
                  <label class="choice"><input type="radio" name="quality" value="auto" checked><span>auto</span></label>
                  <label class="choice"><input type="radio" name="quality" value="high"><span>high</span></label>
                  <label class="choice"><input type="radio" name="quality" value="medium"><span>medium</span></label>
                  <label class="choice"><input type="radio" name="quality" value="low"><span>low</span></label>
                </div>
              </div>
              <label class="field count-field">
                Count
                <input name="n" type="number" min="1" max="10" value="1" aria-label="数量" />
              </label>
            </div>
          </div>
          <button id="submit" type="submit">生成图片</button>
        </form>
      </aside>
      <section class="workspace">
        <div class="toolbar">
          <h2>生成结果</h2>
          <div class="toolbar-actions">
            <button id="status" type="button">Ready</button>
            <div class="job-popover" id="jobsPopover" hidden>
              <div class="job-popover-head">
                <strong>后台 Job</strong>
                <button class="pill-action" id="refreshJobs" type="button">刷新</button>
              </div>
              <div class="job-list" id="jobList">
                <div class="empty">暂无后台 Job</div>
              </div>
            </div>
            <a class="logout" href="/logout">退出</a>
          </div>
        </div>
        <div id="result">
          <div class="empty">No image yet</div>
        </div>
        <section class="panel">
          <div class="panel-title">
            <h3>历史记录 <span class="muted">仅保留最近 30 个，请及时下载</span></h3>
            <div class="panel-actions">
              <span class="muted" id="historyCount">Loading</span>
              <button class="pill-action" id="selectAllHistory" type="button" hidden>全选</button>
              <button class="pill-action" id="selectHistory" type="button">选择</button>
              <button class="pill-action" id="downloadSelected" type="button" hidden>下载所选</button>
              <button class="pill-action danger-action" id="deleteSelected" type="button" hidden>删除所选</button>
            </div>
          </div>
          <div id="history">
            <div class="empty">正在加载历史记录...</div>
          </div>
        </section>
      </section>
    </main>
    <div id="sizeTooltip" hidden></div>
    <div class="modal" id="historyModal" hidden>
      <div class="modal-image">
        <img id="modalImage" alt="history image" />
      </div>
      <div class="modal-info">
        <div class="toolbar">
          <h3>历史详情</h3>
          <button class="pill-action" id="modalClose" type="button">关闭</button>
        </div>
        <div class="muted" id="modalMeta"></div>
        <div class="modal-prompt" id="modalPrompt"></div>
        <div class="modal-actions">
          <a class="pill-action" id="modalOpen" href="#">打开原图</a>
          <a class="pill-action" id="modalDownload" href="#" download>下载</a>
          <button class="pill-action" id="modalReuse" type="button">使用此 Prompt</button>
          <button class="pill-action" id="modalCopyPrompt" type="button">复制 Prompt</button>
        </div>
      </div>
    </div>
    <script>
      const form = document.querySelector("#form");
      const result = document.querySelector("#result");
      const history = document.querySelector("#history");
      const historyCount = document.querySelector("#historyCount");
      const selectAllHistory = document.querySelector("#selectAllHistory");
      const selectHistory = document.querySelector("#selectHistory");
      const downloadSelected = document.querySelector("#downloadSelected");
      const deleteSelected = document.querySelector("#deleteSelected");
      const status = document.querySelector("#status");
      const jobsPopover = document.querySelector("#jobsPopover");
      const refreshJobs = document.querySelector("#refreshJobs");
      const jobList = document.querySelector("#jobList");
      const submit = document.querySelector("#submit");
      const promptInput = form.elements.prompt;
      const modal = document.querySelector("#historyModal");
      const modalImage = document.querySelector("#modalImage");
      const modalMeta = document.querySelector("#modalMeta");
      const modalPrompt = document.querySelector("#modalPrompt");
      const modalOpen = document.querySelector("#modalOpen");
      const modalDownload = document.querySelector("#modalDownload");
      const modalReuse = document.querySelector("#modalReuse");
      const modalCopyPrompt = document.querySelector("#modalCopyPrompt");
      const modalClose = document.querySelector("#modalClose");
      const sizeTooltip = document.querySelector("#sizeTooltip");
      const sizeRatioMap = {
        "1024x1024": "1:1",
        "1536x2048": "3:4",
        "2048x1536": "4:3",
        "3360x1440": "21:9",
        "1024x1536": "2:3",
        "1536x1024": "3:2",
        "2160x3840": "9:16",
        "3840x2160": "16:9",
      };
      let activeHistoryRecord = null;
      let selectingHistory = false;
      let allHistoryRecords = [];
      let visibleHistoryRecords = [];
      const selectedHistoryIds = new Set();
      const backgroundJobs = new Map();
      let timer = null;
      let activePollToken = 0;
      let watchedJobId = null;
      let jobsRefreshTimer = null;
      function formatError(data) {
        if (typeof data?.detail === "string") return data.detail;
        if (data?.detail) return JSON.stringify(data.detail, null, 2);
        return JSON.stringify(data || { error: "生成失败" }, null, 2);
      }
      function setBusy(message) {
        let seconds = 0;
        status.textContent = decorateStatus(`${message} · ${seconds}s`);
        clearInterval(timer);
        timer = setInterval(() => {
          seconds += 1;
          status.textContent = decorateStatus(`${message} · ${seconds}s`);
        }, 1000);
      }
      function stopBusy(message) {
        clearInterval(timer);
        timer = null;
        status.textContent = decorateStatus(message);
      }
      function formatDate(value) {
        if (!value) return "";
        return new Date(value * 1000).toLocaleString();
      }
      function formatQuality(meta = {}) {
        const requested = meta.requested_quality || meta.requestedQuality || meta.quality || "";
        const actual = meta.actual_quality || meta.actualQuality || meta.quality || "";
        if (requested || actual) return `选择:${requested || "-"} / 实际:${actual || "-"}`;
        return "";
      }
      function formatSize(value) {
        if (!value) return "";
        return sizeRatioMap[value] || value;
      }
      function showSizeTooltip(choice) {
        const tip = choice.querySelector(".choice-tip");
        if (!tip) return;
        const rect = choice.getBoundingClientRect();
        sizeTooltip.textContent = tip.textContent;
        sizeTooltip.hidden = false;
        const tooltipRect = sizeTooltip.getBoundingClientRect();
        const left = Math.min(
          Math.max(12, rect.left + rect.width / 2 - tooltipRect.width / 2),
          window.innerWidth - tooltipRect.width - 12
        );
        let top = Math.max(12, rect.top - tooltipRect.height - 4);
        if (top < 12 && rect.bottom + tooltipRect.height + 4 < window.innerHeight - 12) {
          top = rect.bottom + 4;
        }
        sizeTooltip.style.left = `${left}px`;
        sizeTooltip.style.top = `${top}px`;
      }
      function hideSizeTooltip() {
        sizeTooltip.hidden = true;
      }
      document.querySelectorAll('input[name="generate_size"]').forEach((input) => {
        const choice = input.closest(".choice");
        choice.addEventListener("mouseenter", () => showSizeTooltip(choice));
        choice.addEventListener("mouseleave", hideSizeTooltip);
        input.addEventListener("focus", () => showSizeTooltip(choice));
        input.addEventListener("blur", hideSizeTooltip);
      });
      function createImageCard(image, meta = {}, compact = false) {
        const figure = document.createElement("figure");
        const img = document.createElement("img");
        const link = document.createElement("a");
        const download = document.createElement("a");
        const src = image.file || image.url;
        const caption = document.createElement("figcaption");
        const actions = document.createElement("span");
        img.src = src;
        img.alt = meta.prompt || "generated image";
        link.href = src;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = "打开原图";
        download.href = src;
        download.download = src.split("/").pop() || "image.png";
        download.textContent = "下载";
        actions.className = "actions";
        actions.append(link, download);

        if (compact) {
          const prompt = document.createElement("div");
          const detail = document.createElement("div");
          const reuse = document.createElement("button");
          prompt.className = "prompt-line";
          prompt.title = meta.prompt || "";
          prompt.textContent = meta.prompt || "历史图片";
          detail.className = "muted";
          detail.textContent = [formatSize(meta.size), formatQuality(meta), formatDate(meta.created_at)].filter(Boolean).join(" · ");
          reuse.type = "button";
          reuse.className = "text-action";
          reuse.textContent = "使用此 Prompt";
          reuse.addEventListener("click", () => {
            promptInput.value = meta.prompt || "";
            promptInput.focus();
          });
          actions.append(reuse);
          caption.append(prompt, detail, actions);
        } else {
          const detail = document.createElement("span");
          detail.textContent = [formatSize(meta.size), formatQuality(meta)].filter(Boolean).join(" · ");
          caption.append(detail, actions);
        }

        if (!compact) figure.className = "result-card";
        figure.append(img, caption);
        return figure;
      }
      async function openHistoryModal(record) {
        modalPrompt.textContent = "加载中...";
        modalMeta.textContent = [formatSize(record.size), formatQuality(record), formatDate(record.created_at)].filter(Boolean).join(" · ");
        modal.hidden = false;
        const response = await fetch(`/v1/history/${record.id}`);
        if (!response.ok) {
          modalPrompt.textContent = `历史详情加载失败：HTTP ${response.status}`;
          return;
        }
        const detail = await response.json();
        const src = detail.file || detail.url;
        if (!src) {
          modalPrompt.textContent = "这条历史记录没有可用图片地址";
          return;
        }
        record = detail;
        activeHistoryRecord = record;
        modalImage.src = src;
        modalImage.alt = record.prompt || "history image";
        modalMeta.textContent = [formatSize(record.size), formatQuality(record), formatDate(record.created_at)].filter(Boolean).join(" · ");
        modalPrompt.textContent = record.prompt || "无 prompt";
        modalOpen.href = src;
        modalDownload.href = src;
        modalDownload.download = src.split("/").pop() || "image.png";
        modal.hidden = false;
      }
      function closeHistoryModal() {
        modal.hidden = true;
        modalImage.removeAttribute("src");
        activeHistoryRecord = null;
      }
      modalClose.addEventListener("click", closeHistoryModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeHistoryModal();
      });
      modalReuse.addEventListener("click", () => {
        if (!activeHistoryRecord) return;
        promptInput.value = activeHistoryRecord.prompt || "";
        promptInput.focus();
        closeHistoryModal();
      });
      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.append(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
      modalCopyPrompt.addEventListener("click", async () => {
        if (!activeHistoryRecord) return;
        const originalText = modalCopyPrompt.textContent;
        try {
          await copyText(activeHistoryRecord.prompt || "");
          modalCopyPrompt.textContent = "已复制";
          setTimeout(() => {
            modalCopyPrompt.textContent = originalText;
          }, 1400);
        } catch (error) {
          modalCopyPrompt.textContent = "复制失败";
          setTimeout(() => {
            modalCopyPrompt.textContent = originalText;
          }, 1400);
        }
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) closeHistoryModal();
      });
      function updateSelectionUi() {
        const visibleIds = visibleHistoryRecords.map((record) => record.id).filter(Boolean);
        const allSelected = visibleIds.length > 0 && visibleIds.every((id) => selectedHistoryIds.has(id));
        history.classList.toggle("selecting", selectingHistory);
        selectHistory.textContent = selectingHistory ? "取消" : "选择";
        selectAllHistory.hidden = !selectingHistory;
        selectAllHistory.textContent = allSelected ? "取消全选" : "全选";
        downloadSelected.hidden = !selectingHistory || selectedHistoryIds.size === 0;
        deleteSelected.hidden = !selectingHistory || selectedHistoryIds.size === 0;
        downloadSelected.textContent = `下载所选${selectedHistoryIds.size ? ` (${selectedHistoryIds.size})` : ""}`;
        deleteSelected.textContent = `删除所选${selectedHistoryIds.size ? ` (${selectedHistoryIds.size})` : ""}`;
      }
      selectHistory.addEventListener("click", () => {
        selectingHistory = !selectingHistory;
        selectedHistoryIds.clear();
        history.querySelectorAll(".history-check").forEach((input) => {
          input.checked = false;
        });
        updateSelectionUi();
      });
      selectAllHistory.addEventListener("click", () => {
        const visibleIds = visibleHistoryRecords.map((record) => record.id).filter(Boolean);
        const allSelected = visibleIds.length > 0 && visibleIds.every((id) => selectedHistoryIds.has(id));
        if (allSelected) {
          visibleIds.forEach((id) => selectedHistoryIds.delete(id));
        } else {
          visibleIds.forEach((id) => selectedHistoryIds.add(id));
        }
        history.querySelectorAll(".history-check").forEach((input) => {
          input.checked = selectedHistoryIds.has(input.dataset.historyId);
        });
        updateSelectionUi();
      });
      downloadSelected.addEventListener("click", async () => {
        if (!selectedHistoryIds.size) return;
        const response = await fetch("/v1/history/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ids: Array.from(selectedHistoryIds) })
        });
        if (!response.ok) {
          alert(`下载失败：HTTP ${response.status}`);
          return;
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "history-images.zip";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      });
      deleteSelected.addEventListener("click", async () => {
        if (!selectedHistoryIds.size) return;
        if (!confirm(`确定删除选中的 ${selectedHistoryIds.size} 条历史出图吗？本地图片文件也会一起删除。`)) return;
        const response = await fetch("/v1/history/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ids: Array.from(selectedHistoryIds) })
        });
        if (!response.ok) {
          alert(`删除失败：HTTP ${response.status}`);
          return;
        }
        selectingHistory = false;
        selectedHistoryIds.clear();
        await loadHistory();
      });
      function createHistoryItem(record) {
        const button = document.createElement("button");
        const check = document.createElement("input");
        const meta = document.createElement("div");
        const prompt = document.createElement("div");
        const detail = document.createElement("div");
        const arrow = document.createElement("span");
        button.type = "button";
        button.className = "history-item";
        check.type = "checkbox";
        check.className = "history-check";
        check.dataset.historyId = record.id;
        check.checked = selectedHistoryIds.has(record.id);
        check.addEventListener("click", (event) => {
          event.stopPropagation();
          if (check.checked) selectedHistoryIds.add(record.id);
          else selectedHistoryIds.delete(record.id);
          updateSelectionUi();
        });
        meta.className = "history-meta";
        prompt.className = "prompt-line";
        prompt.textContent = record.prompt || "历史图片";
        detail.className = "muted";
        detail.textContent = [formatSize(record.size), formatQuality(record), formatDate(record.created_at)].filter(Boolean).join(" · ");
        arrow.className = "view-pill pill-action";
        arrow.textContent = "查看";
        meta.append(prompt, detail);
        button.append(check, meta, arrow);
        button.addEventListener("click", () => {
          if (selectingHistory) {
            check.checked = !check.checked;
            if (check.checked) selectedHistoryIds.add(record.id);
            else selectedHistoryIds.delete(record.id);
            updateSelectionUi();
            return;
          }
          openHistoryModal(record);
        });
        return button;
      }
      function renderHistory(records) {
        const visibleRecords = records.filter((record) => !record.operation || record.operation === "generate");
        visibleHistoryRecords = visibleRecords;
        historyCount.textContent = `${visibleRecords.length} item${visibleRecords.length === 1 ? "" : "s"}`;
        if (!visibleRecords.length) {
          history.replaceChildren(Object.assign(document.createElement("div"), {
            className: "empty",
            textContent: "还没有历史出图"
          }));
          updateSelectionUi();
          return;
        }
        history.replaceChildren(...visibleRecords.map((record) => createHistoryItem(record)));
        updateSelectionUi();
      }
      async function loadHistory() {
        try {
          const response = await fetch("/v1/history");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          allHistoryRecords = data.images || [];
          renderHistory(allHistoryRecords);
        } catch (error) {
          historyCount.textContent = "Failed";
          history.replaceChildren(Object.assign(document.createElement("div"), {
            className: "error",
            textContent: `历史记录加载失败：${error.message}`
          }));
        }
      }
      function isActiveJob(job) {
        return job?.status === "queued" || job?.status === "running";
      }
      function bodyFromJob(job) {
        const payload = job.payload || {};
        return {
          prompt: job.prompt || payload.prompt || "",
          size: payload.size || "",
          quality: payload.quality || "auto",
          n: payload.n || 1
        };
      }
      function activeJobLabel(count) {
        return count ? `后台运行 ${count} 个 Job` : "Ready";
      }
      function decorateStatus(message) {
        const count = backgroundJobs.size;
        if (!count) return message;
        if (!watchedJobId && (message === "Ready" || message === "后台任务已完成")) return activeJobLabel(count);
        return `${message} / 后台 ${count}`;
      }
      function refreshIdleStatus() {
        if (!timer && !watchedJobId) status.textContent = activeJobLabel(backgroundJobs.size);
      }
      function promptPreview(job) {
        const text = bodyFromJob(job).prompt || "无 prompt";
        return text.length > 64 ? `${text.slice(0, 64)}...` : text;
      }
      async function cancelBackgroundJob(job, event) {
        event?.stopPropagation();
        try {
          await fetch(`/v1/jobs/${job.id}/cancel`, { method: "POST" });
        } finally {
          backgroundJobs.delete(job.id);
          renderJobsPopover();
          await loadHistory();
        }
      }
      function renderJobsPopover() {
        const jobs = Array.from(backgroundJobs.values()).filter(isActiveJob);
        backgroundJobs.clear();
        jobs.forEach((job) => backgroundJobs.set(job.id, job));
        if (!jobs.length) {
          jobList.replaceChildren(Object.assign(document.createElement("div"), {
            className: "empty",
            textContent: "暂无后台 Job"
          }));
          refreshIdleStatus();
          return;
        }
        const nodes = jobs.map((job) => {
          const row = document.createElement("div");
          const meta = document.createElement("div");
          const prompt = document.createElement("div");
          const detail = document.createElement("div");
          const side = document.createElement("div");
          const state = document.createElement("span");
          const cancel = document.createElement("button");
          const body = bodyFromJob(job);
          row.className = "job-row";
          row.tabIndex = 0;
          row.setAttribute("role", "button");
          row.setAttribute("aria-label", "查看后台 Job");
          meta.className = "job-row-meta";
          prompt.className = "prompt-line";
          prompt.title = body.prompt || "";
          prompt.textContent = promptPreview(job);
          detail.className = "muted";
          detail.textContent = [formatSize(body.size), body.quality || "auto", job.id].filter(Boolean).join(" · ");
          state.className = "job-row-status";
          state.textContent = job.status || "running";
          cancel.type = "button";
          cancel.className = "job-row-cancel";
          cancel.title = "取消 Job";
          cancel.setAttribute("aria-label", "取消 Job");
          cancel.textContent = "×";
          cancel.addEventListener("click", (event) => cancelBackgroundJob(job, event));
          side.className = "job-row-side";
          side.append(state, cancel);
          meta.append(prompt, detail);
          row.append(meta, side);
          row.addEventListener("click", () => enterJob(job));
          row.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              enterJob(job);
            }
          });
          return row;
        });
        jobList.replaceChildren(...nodes);
        refreshIdleStatus();
      }
      function rememberBackgroundJob(job) {
        if (!isActiveJob(job) || job.id === watchedJobId) return;
        backgroundJobs.set(job.id, job);
        renderJobsPopover();
      }
      async function refreshBackgroundJobs() {
        try {
          const response = await fetch("/v1/jobs");
          if (!response.ok) return;
          const data = await response.json();
          const activeJobs = (data.jobs || []).filter(isActiveJob);
          const activeIds = new Set(activeJobs.map((job) => job.id));
          for (const id of Array.from(backgroundJobs.keys())) {
            if (!activeIds.has(id)) backgroundJobs.delete(id);
          }
          activeJobs.forEach((job) => {
            if (job.id !== watchedJobId) backgroundJobs.set(job.id, job);
          });
          renderJobsPopover();
        } catch (error) {
          return;
        }
      }
      function toggleJobsPopover() {
        jobsPopover.hidden = !jobsPopover.hidden;
        if (!jobsPopover.hidden) refreshBackgroundJobs();
      }
      status.addEventListener("click", toggleJobsPopover);
      refreshJobs.addEventListener("click", refreshBackgroundJobs);
      document.addEventListener("click", (event) => {
        if (jobsPopover.hidden) return;
        if (event.target === status || jobsPopover.contains(event.target)) return;
        jobsPopover.hidden = true;
      });
      function showBackgroundNotice(job) {
        const state = document.createElement("div");
        state.className = "empty";
        state.innerHTML = `
          <div class="loader">
            <div>Job 已转入后台运行</div>
            <div class="muted">${job.id}</div>
            <div class="muted">你可以继续提交新的 Prompt；完成后会自动刷新历史记录。</div>
          </div>
        `;
        result.replaceChildren(state);
      }
      async function pollBackgroundJob(jobId) {
        let polls = 0;
        while (backgroundJobs.has(jobId)) {
          await new Promise((resolve) => setTimeout(resolve, polls < 6 ? 5000 : 10000));
          polls += 1;
          try {
            const response = await fetch(`/v1/jobs/${jobId}`);
            if (!response.ok) continue;
            const job = await response.json();
            if (isActiveJob(job)) {
              if (job.id !== watchedJobId) backgroundJobs.set(job.id, job);
              renderJobsPopover();
              continue;
            }
            backgroundJobs.delete(jobId);
            renderJobsPopover();
            await loadHistory();
            if (!watchedJobId) {
              stopBusy(backgroundJobs.size ? activeJobLabel(backgroundJobs.size) : "后台任务已完成");
            }
            return;
          } catch (error) {
            continue;
          }
        }
      }
      function moveJobToBackground(job) {
        activePollToken += 1;
        watchedJobId = null;
        submit.disabled = false;
        if (!backgroundJobs.has(job.id)) {
          backgroundJobs.set(job.id, job);
          pollBackgroundJob(job.id);
        }
        renderJobsPopover();
        stopBusy(activeJobLabel(backgroundJobs.size));
        showBackgroundNotice(job);
      }
      function enterJob(job) {
        backgroundJobs.delete(job.id);
        renderJobsPopover();
        jobsPopover.hidden = true;
        const token = activePollToken + 1;
        activePollToken = token;
        watchedJobId = job.id;
        submit.disabled = true;
        setBusy("Generating");
        showJobState(job, bodyFromJob(job), token);
        pollJob(job.id, bodyFromJob(job), token);
      }
      function showJobState(job, body, token) {
        const state = document.createElement("div");
        state.className = "empty";
        const canCancel = job.status === "queued" || job.status === "running";
        state.innerHTML = `
          <div class="loader">
            ${canCancel ? '<div class="spinner"></div>' : ""}
            <div>Job ${job.status}</div>
            <div class="muted">${job.id}</div>
            ${canCancel ? '<div class="actions"><button class="pill-action" data-action="background" type="button">后台运行</button><button class="pill-action danger-action" data-action="cancel" type="button">取消生成</button></div>' : ""}
          </div>
        `;
        if (canCancel) {
          state.querySelector('[data-action="background"]').addEventListener("click", () => {
            moveJobToBackground(job);
          });
          state.querySelector('[data-action="cancel"]').addEventListener("click", async () => {
            await fetch(`/v1/jobs/${job.id}/cancel`, { method: "POST" });
            if (token !== activePollToken) return;
            stopBusy("Cancelled");
            submit.disabled = false;
            watchedJobId = null;
            await pollJob(job.id, body, token);
          });
        }
        result.replaceChildren(state);
      }
      async function pollJob(jobId, body, token) {
        let polls = 0;
        while (true) {
          if (token !== activePollToken) return;
          const response = await fetch(`/v1/jobs/${jobId}`);
          polls += 1;
          const job = await response.json();
          if (token !== activePollToken) return;
          if (!response.ok) {
            stopBusy("Failed");
            submit.disabled = false;
            watchedJobId = null;
            result.replaceChildren(Object.assign(document.createElement("div"), {
              className: "error",
              textContent: `Job 查询失败 (${response.status})：\n${formatError(job)}`
            }));
            return;
          }
          if (job.status === "queued" || job.status === "running") {
            showJobState(job, body, token);
            const delay = polls < 5 ? 2000 : polls < 9 ? 5000 : 10000;
            await new Promise((resolve) => setTimeout(resolve, delay));
            continue;
          }
          backgroundJobs.delete(jobId);
          renderJobsPopover();
          submit.disabled = false;
          watchedJobId = null;
          if (job.status === "cancelled") {
            stopBusy("Cancelled");
            result.replaceChildren(Object.assign(document.createElement("div"), {
              className: "empty",
              textContent: "生成已取消。本地不会保存这次结果；如果 provider 已经开始生成，它可能仍会在远端完成。"
            }));
            return;
          }
          if (job.status === "failed") {
            stopBusy("Failed");
            result.replaceChildren(Object.assign(document.createElement("div"), {
              className: "error",
              textContent: `生成失败 (${job.status_code || 500})：\n${JSON.stringify(job.error || job, null, 2)}`
            }));
            return;
          }
          const data = job.result;
          const meta = {
            prompt: body.prompt,
            size: body.size,
            quality: data?.provider_response?.quality || body.quality,
            requested_quality: body.quality,
            actual_quality: data?.provider_response?.quality || body.quality
          };
          const imageNodes = (data?.images || [])
            .filter((image) => image.file || image.url)
            .map((image) => createImageCard(image, meta));
          stopBusy(`${imageNodes.length} image${imageNodes.length === 1 ? "" : "s"}`);
          result.replaceChildren(...imageNodes);
          await loadHistory();
          return;
        }
      }
      async function resumeActiveJob() {
        const response = await fetch("/v1/jobs");
        if (!response.ok) return;
        const data = await response.json();
        (data.jobs || []).filter(isActiveJob).forEach((job) => {
          backgroundJobs.set(job.id, job);
        });
        const active = (data.jobs || []).find((job) => job.status === "queued" || job.status === "running");
        if (!active) {
          renderJobsPopover();
          return;
        }
        backgroundJobs.delete(active.id);
        renderJobsPopover();
          const payload = active.payload || {};
          const body = {
            prompt: active.prompt || payload.prompt || "",
            size: payload.size || "",
            quality: payload.quality || "auto",
            n: payload.n || 1,
          };
        const token = activePollToken + 1;
        activePollToken = token;
        watchedJobId = active.id;
        setBusy("Generating");
        submit.disabled = true;
        showJobState(active, body, token);
        await pollJob(active.id, body, token);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const token = activePollToken + 1;
        activePollToken = token;
        watchedJobId = null;
        setBusy("Generating");
        submit.disabled = true;
        const loader = document.createElement("div");
        loader.className = "empty";
        loader.innerHTML = '<div class="loader"><div class="spinner"></div><div>生成中，4K 或复杂提示词可能需要几分钟...</div></div>';
        result.replaceChildren(loader);
        const formData = new FormData(form);
        const selectedSize = formData.get("generate_size");
        formData.set("size", selectedSize || "1024x1024");
        formData.delete("generate_size");
        const body = Object.fromEntries(formData.entries());
        const countInput = form.querySelector('input[name="n"]');
        const requestedCount = Number.parseInt(countInput?.value || "1", 10);
        body.n = Number.isFinite(requestedCount) ? Math.min(10, Math.max(1, requestedCount)) : 1;
        let response;
        let data;
        try {
          response = await fetch("/v1/jobs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          data = await response.json();
        } catch (error) {
          stopBusy("Failed");
          submit.disabled = false;
          watchedJobId = null;
          result.replaceChildren(Object.assign(document.createElement("div"), {
            className: "error",
            textContent: `请求失败：${error.message}`
          }));
          return;
        }
        if (!response.ok) {
          stopBusy("Failed");
          submit.disabled = false;
          watchedJobId = null;
          result.replaceChildren(Object.assign(document.createElement("div"), {
            className: "error",
            textContent: `生成失败 (${response.status})：\n${formatError(data)}`
          }));
          return;
        }
        watchedJobId = data.id;
        backgroundJobs.delete(data.id);
        renderJobsPopover();
        showJobState(data, body, token);
        await pollJob(data.id, body, token);
      });
      loadHistory();
      resumeActiveJob();
      refreshBackgroundJobs();
      jobsRefreshTimer = setInterval(refreshBackgroundJobs, 10000);
    </script>
  </body>
</html>
