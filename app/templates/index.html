<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image CLI — Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      :root {
        --bg: #f5f6fa;
        --bg-surface: #ffffff;
        --bg-card: #ffffff;
        --bg-elevated: #f0f1f5;
        --bg-input: #f0f1f5;
        --border: #e2e4ea;
        --border-subtle: #ecedf2;
        --border-hover: #d0d2da;
        --border-focus: rgba(56, 140, 255, 0.5);
        --text: #1a1d2e;
        --text-secondary: #5a6078;
        --text-dim: #8a8ea4;
        --text-muted: #b0b4c4;
        --accent: #388cff;
        --accent-light: #5ba0ff;
        --accent-glow: rgba(56, 140, 255, 0.1);
        --accent-subtle: rgba(56, 140, 255, 0.06);
        --danger: #e5484d;
        --danger-bg: rgba(229, 72, 77, 0.06);
        --danger-border: rgba(229, 72, 77, 0.15);
        --success: #30a46c;
        --success-bg: rgba(48, 164, 108, 0.08);
        --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
        --sidebar-w: clamp(390px, 25vw, 520px);
        --radius: 10px;
        --radius-sm: 7px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 14px;
        line-height: 1.5;
      }
      button, textarea, input, select { font-family: inherit; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }

      /* ─── Layout ─── */
      .app {
        height: 100vh;
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        overflow: hidden;
      }

      /* ─── Sidebar ─── */
      .sidebar {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg-surface);
        border-right: 1px solid var(--border);
        overflow: hidden;
      }
      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px 14px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .logo-icon {
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        background: var(--accent-subtle);
        border: 1px solid rgba(56, 140, 255, 0.12);
        border-radius: 6px;
      }
      .logo-icon svg { width: 13px; height: 13px; color: var(--accent); }
      .top-actions { display: flex; gap: 4px; }
      .icon-btn {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
      }
      .icon-btn:hover {
        background: var(--bg-elevated);
        color: var(--text-secondary);
        border-color: var(--border-hover);
        text-decoration: none;
      }
      .icon-btn svg { width: 14px; height: 14px; }

      /* ─── Form ─── */
      .gen-form {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0 22px 18px;
        overflow-y: auto;
      }
      .field { display: grid; gap: 6px; }
      .field-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-dim);
      }
      .prompt-area {
        flex: 1;
        min-height: 130px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 6px;
      }
      textarea {
        width: 100%;
        height: 100%;
        min-height: 90px;
        padding: 10px 12px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 13px;
        line-height: 1.6;
        resize: none;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }
      textarea::placeholder { color: var(--text-muted); }
      textarea:hover { border-color: var(--border-hover); background: #fff; }
      textarea:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-glow);
        background: #fff;
      }

      .segmented { display: flex; gap: 3px; }
      .seg-btn {
        flex: 1;
        padding: 7px 4px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-dim);
        font-size: 12px;
        font-weight: 500;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .seg-btn:hover {
        background: var(--bg-elevated);
        color: var(--text-secondary);
        border-color: var(--border-hover);
      }
      .seg-btn.active {
        background: var(--accent-subtle);
        border-color: rgba(56, 140, 255, 0.3);
        color: var(--accent);
        font-weight: 600;
      }

      .ratio-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
      }
      .ratio-btn {
        padding: 8px 4px 6px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-dim);
        font-size: 11px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
        display: grid;
        place-items: center;
        gap: 4px;
      }
      .ratio-btn:hover {
        background: var(--bg-elevated);
        color: var(--text-secondary);
        border-color: var(--border-hover);
      }
      .ratio-btn.active {
        background: var(--accent-subtle);
        border-color: rgba(56, 140, 255, 0.3);
        color: var(--accent);
        font-weight: 700;
      }
      .ratio-shape {
        display: block;
        border: 1.5px solid currentColor;
        border-radius: 2px;
        height: 16px;
        opacity: 0.5;
        transition: all 0.15s;
      }
      .ratio-btn.active .ratio-shape { opacity: 1; }
      .ratio-1-1 { width: 16px; }
      .ratio-3-4 { width: 12px; }
      .ratio-4-3 { width: 22px; }
      .ratio-9-16 { width: 9px; }
      .ratio-16-9 { width: 28px; }
      .ratio-21-9 { width: 36px; max-width: 100%; }

      .count-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }
      .count-input {
        width: 68px;
        padding: 7px 10px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        text-align: center;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }
      .count-input:hover { border-color: var(--border-hover); background: #fff; }
      .count-input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px var(--accent-glow);
        background: #fff;
      }

      .submit-btn {
        width: 100%;
        padding: 10px 18px;
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .submit-btn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        background-size: 200% 100%;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .submit-btn:hover:not(:disabled) {
        background: var(--accent-light);
        transform: translateY(-1px);
        box-shadow: 0 2px 12px rgba(56, 140, 255, 0.25);
      }
      .submit-btn:hover::after { opacity: 1; animation: shimmer 1.5s infinite; }
      .submit-btn:active:not(:disabled) { transform: translateY(0); }
      .submit-btn:disabled { opacity: 0.4; cursor: wait; }

      /* ─── Workspace ─── */
      .workspace {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr var(--history-h, 260px);
        overflow: hidden;
        background: var(--bg);
        position: relative;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-bottom: 1px solid var(--border-subtle);
        background: var(--bg-surface);
      }
      .topbar-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .topbar-actions { display: flex; align-items: center; gap: 6px; }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text-dim);
        font-size: 11px;
        font-weight: 500;
        font-family: var(--font-mono);
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .status-pill:hover {
        background: var(--bg-elevated);
        border-color: var(--border-hover);
        color: var(--text-secondary);
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: all 0.3s;
      }
      .status-dot.live { background: var(--success); box-shadow: 0 0 5px rgba(48, 164, 108, 0.3); }
      .status-dot.busy { background: var(--accent); box-shadow: 0 0 5px rgba(56, 140, 255, 0.3); animation: pulse 1.5s ease infinite; }
      .link-btn {
        padding: 5px 10px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text-dim);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
      }
      .link-btn:hover {
        background: var(--bg-elevated);
        border-color: var(--border-hover);
        color: var(--text-secondary);
        text-decoration: none;
      }

      .result-area {
        min-height: 0;
        overflow: hidden;
        padding: 18px 24px;
        display: grid;
      }
      .result-grid {
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        grid-auto-rows: minmax(0, 1fr);
        gap: 12px;
        animation: fadeInUp 0.3s ease both;
      }
      .result-card {
        min-height: 0;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        transition: all 0.2s;
        animation: fadeInUp 0.3s ease both;
      }
      .result-card:hover {
        border-color: var(--border-hover);
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .result-card img {
        width: 100%;
        height: 100%;
        min-height: 0;
        object-fit: contain;
        object-position: center;
        display: block;
        background: var(--bg-elevated);
        cursor: pointer;
      }
      .result-card-footer {
        padding: 8px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .result-card-meta {
        min-width: 0;
        font-size: 10px;
        color: var(--text-dim);
        font-family: var(--font-mono);
      }
      .result-card-actions { display: flex; gap: 3px; flex-shrink: 0; }
      .mini-btn {
        padding: 3px 8px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text-dim);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
      }
      .mini-btn:hover {
        background: var(--bg-elevated);
        border-color: var(--border-hover);
        color: var(--text-secondary);
      }

      .empty-state {
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 10px;
        min-height: 260px;
        color: var(--text-muted);
        font-size: 13px;
        text-align: center;
        padding: 40px;
      }
      .empty-state .icon { opacity: 0.4; line-height: 0; }
      .loader-state {
        display: grid;
        align-content: center;
        justify-items: center;
        min-height: 260px;
        gap: 10px;
        text-align: center;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-text { color: var(--text-secondary); font-size: 13px; font-weight: 500; }
      .loader-sub { color: var(--text-muted); font-size: 11px; font-family: var(--font-mono); }
      .error-box {
        padding: 14px;
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        border-radius: var(--radius);
        color: var(--danger);
        font-size: 12px;
        font-family: var(--font-mono);
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
        animation: fadeInUp 0.3s ease both;
      }
      .inline-actions { display: flex; gap: 6px; margin-top: 10px; }

      /* ─── History Panel ─── */
      .history-panel {
        min-height: 130px;
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        position: relative;
        background: var(--bg-surface);
      }
      .history-resize {
        position: absolute;
        top: -6px;
        left: 20px;
        right: 20px;
        height: 12px;
        cursor: ns-resize;
        touch-action: none;
        display: grid;
        place-items: center;
        z-index: 10;
      }
      .history-resize::before {
        content: '';
        width: 36px;
        height: 3px;
        border-radius: 99px;
        background: var(--border);
        transition: background 0.15s;
      }
      .history-resize:hover::before { background: var(--text-muted); }
      .history-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 24px 6px;
      }
      .history-header h3 {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .history-header h3 span {
        font-size: 10px;
        font-weight: 400;
        color: var(--text-muted);
        margin-left: 5px;
        text-transform: none;
        letter-spacing: 0;
      }
      .history-actions { display: flex; align-items: center; gap: 3px; }
      .history-count {
        font-size: 10px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        margin-right: 4px;
      }
      .history-list {
        min-height: 0;
        overflow-y: auto;
        padding: 0 24px 10px;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .history-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.12s;
      }
      .history-row:hover {
        background: var(--bg-elevated);
        border-color: var(--border);
      }
      .history-check {
        width: 14px;
        height: 14px;
        accent-color: var(--accent);
        display: none;
      }
      .selecting .history-check { display: block; }
      .history-info { min-width: 0; display: grid; gap: 1px; }
      .history-prompt {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .history-detail {
        font-size: 10px;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .history-view {
        padding: 2px 7px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-dim);
        font-size: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
      }
      .history-row:hover .history-view {
        border-color: rgba(56, 140, 255, 0.3);
        color: var(--accent);
      }

      /* ─── Jobs Popover ─── */
      .jobs-popover {
        position: absolute;
        right: 24px;
        top: 48px;
        z-index: 100;
        width: min(380px, calc(100vw - 48px));
        max-height: min(440px, calc(100vh - 100px));
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        animation: fadeInUp 0.2s ease both;
      }
      .jobs-popover[hidden] { display: none; }
      .jobs-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .jobs-head strong { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
      .jobs-list {
        overflow-y: auto;
        padding: 4px;
        display: grid;
        gap: 1px;
      }
      .job-item {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        padding: 7px 8px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.12s;
        text-align: left;
      }
      .job-item:hover { background: var(--bg-elevated); border-color: var(--border); }
      .job-meta { min-width: 0; display: grid; gap: 1px; }
      .job-prompt {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .job-detail { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
      .job-side { display: flex; align-items: center; gap: 4px; }
      .job-status {
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 9px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .job-status.running { border-color: rgba(56, 140, 255, 0.3); color: var(--accent); }
      .job-status.queued { border-color: var(--border); color: var(--text-muted); }
      .job-cancel {
        width: 20px;
        height: 20px;
        display: grid;
        place-items: center;
        background: transparent;
        border: 1px solid var(--danger-border);
        border-radius: 50%;
        color: var(--danger);
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
        transition: all 0.12s;
      }
      .job-cancel:hover { background: var(--danger-bg); border-color: var(--danger); }

      /* ─── Modal ─── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        width: 100vw;
        height: 100dvh;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(280px, 24vw, 380px);
        grid-template-rows: minmax(0, 1fr);
        padding: 16px;
        gap: 0;
        min-height: 0;
        animation: fadeIn 0.2s ease both;
      }
      .modal-overlay[hidden] { display: none; }
      .modal-image-wrap {
        position: relative;
        min-width: 0;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        border-radius: var(--radius) 0 0 var(--radius);
        padding: 24px 12px;
        overflow: hidden;
      }
      .modal-image-wrap img {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
        border-radius: 6px;
      }
      .modal-info {
        min-height: 0;
        background: var(--bg-card);
        border-radius: 0 var(--radius) var(--radius) 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        gap: 12px;
        padding: 18px;
        overflow-y: auto;
      }
      .modal-info-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-info-head h3 { font-size: 14px; font-weight: 600; }
      .modal-meta { font-size: 10px; font-family: var(--font-mono); color: var(--text-muted); }
      .modal-prompt {
        padding: 10px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-y: auto;
      }
      .modal-actions { display: flex; flex-wrap: wrap; gap: 5px; }

      /* ─── Responsive ─── */
      @media (max-width: 900px) {
        :root { --sidebar-w: 100%; }
        body {
          height: auto;
          min-height: 100dvh;
          overflow-y: auto;
        }
        .app {
          height: auto;
          min-height: 100dvh;
          display: block;
          overflow: visible;
        }
        .sidebar {
          height: auto;
          max-height: none;
          border-right: 0;
          border-bottom: 1px solid var(--border);
          overflow: visible;
        }
        .gen-form {
          overflow: visible;
        }
        .prompt-area {
          flex: none;
          min-height: 170px;
        }
        .workspace {
          height: auto;
          min-height: 0;
          grid-template-rows: auto auto auto;
          overflow: visible;
        }
        .result-area {
          overflow: hidden;
          min-height: 360px;
          height: 52dvh;
        }
        .history-panel {
          min-height: 0;
          overflow: visible;
        }
        .history-list {
          overflow: visible;
        }
        .history-resize {
          top: -18px;
          left: 0;
          right: 0;
          height: 36px;
        }
        .modal-overlay {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: minmax(0, 62dvh) minmax(170px, 34dvh);
          padding: 8px;
        }
        .modal-image-wrap {
          padding: 18px 8px;
          border-radius: var(--radius) var(--radius) 0 0;
        }
        .modal-info {
          border-radius: 0 0 var(--radius) var(--radius);
        }
      }
      @media (max-width: 480px) {
        .topbar { padding: 10px 14px; }
        .result-area { padding: 12px 14px; }
        .history-list { padding: 0 14px 8px; }
        .history-header { padding: 8px 14px 4px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <div class="logo-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
              </svg>
            </div>
            Image CLI
          </div>
          <div class="top-actions">
            <a class="icon-btn" href="/debug" target="_blank" rel="noopener" title="Debug Logs">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            </a>
            <a class="icon-btn" href="/logout" title="Logout">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </a>
          </div>
        </div>
        <form class="gen-form" id="form">
          <div class="field prompt-area">
            <div class="field-label">Prompt</div>
            <textarea name="prompt" placeholder="Describe the image you want to create..." required></textarea>
          </div>
          <div class="field">
            <div class="field-label">Aspect Ratio</div>
            <div class="ratio-grid" id="ratioGrid">
              <button type="button" class="ratio-btn active" data-value="1024x1024" data-ratio="1:1">
                <i class="ratio-shape ratio-1-1"></i>1:1
              </button>
              <button type="button" class="ratio-btn" data-value="1536x2048" data-ratio="3:4">
                <i class="ratio-shape ratio-3-4"></i>3:4
              </button>
              <button type="button" class="ratio-btn" data-value="2048x1536" data-ratio="4:3">
                <i class="ratio-shape ratio-4-3"></i>4:3
              </button>
              <button type="button" class="ratio-btn" data-value="2160x3840" data-ratio="9:16">
                <i class="ratio-shape ratio-9-16"></i>9:16
              </button>
              <button type="button" class="ratio-btn" data-value="3840x2160" data-ratio="16:9">
                <i class="ratio-shape ratio-16-9"></i>16:9
              </button>
              <button type="button" class="ratio-btn" data-value="3360x1440" data-ratio="21:9">
                <i class="ratio-shape ratio-21-9"></i>21:9
              </button>
            </div>
          </div>
          <div class="field">
            <div class="field-label">Quality</div>
            <div class="segmented" id="qualitySeg">
              <button type="button" class="seg-btn active" data-value="auto">auto</button>
              <button type="button" class="seg-btn" data-value="high">high</button>
              <button type="button" class="seg-btn" data-value="medium">medium</button>
              <button type="button" class="seg-btn" data-value="low">low</button>
            </div>
          </div>
          <div class="field count-row">
            <div><div class="field-label">Count</div></div>
            <input class="count-input" name="n" type="number" min="1" max="10" value="1" />
          </div>
          <button class="submit-btn" id="submit" type="submit">Generate</button>
        </form>
      </aside>

      <section class="workspace">
        <div class="topbar">
          <div class="topbar-title">Results</div>
          <div class="topbar-actions">
            <button class="status-pill" id="status" type="button">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusText">Ready</span>
            </button>
          </div>
        </div>

        <div class="result-area" id="result">
          <div class="empty-state">
            <div class="icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            </div>
            <div>Write a prompt and generate your first image</div>
          </div>
        </div>

        <div class="jobs-popover" id="jobsPopover" hidden>
          <div class="jobs-head">
            <strong>Background Jobs</strong>
            <div style="display:flex;gap:3px;">
              <button class="mini-btn" id="refreshJobs" type="button">Refresh</button>
              <button class="mini-btn" id="closeJobs" type="button">Close</button>
            </div>
          </div>
          <div class="jobs-list" id="jobList">
            <div class="empty-state" style="min-height:80px;font-size:11px;">No active jobs</div>
          </div>
        </div>

        <section class="history-panel" id="historyPanel">
          <div class="history-resize" id="historyResize"></div>
          <div class="history-header">
            <h3>History <span>last 30 records</span></h3>
            <div class="history-actions">
              <span class="history-count" id="historyCount">--</span>
              <button class="mini-btn" id="selectAllHistory" type="button" hidden>Select All</button>
              <button class="mini-btn" id="selectHistory" type="button">Select</button>
              <button class="mini-btn" id="downloadSelected" type="button" hidden>Download</button>
              <button class="mini-btn" id="deleteSelected" type="button" hidden style="border-color:var(--danger-border);color:var(--danger);">Delete</button>
            </div>
          </div>
          <div class="history-list" id="history">
            <div class="empty-state" style="min-height:50px;font-size:11px;">Loading history...</div>
          </div>
        </section>
      </section>
    </div>

    <div class="modal-overlay" id="modal" hidden>
      <div class="modal-image-wrap">
        <img id="modalImage" alt="history image" />
      </div>
      <div class="modal-info">
        <div class="modal-info-head">
          <h3>Details</h3>
          <button class="mini-btn" id="modalClose" type="button">Close</button>
        </div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-prompt" id="modalPrompt"></div>
        <div class="modal-actions">
          <a class="mini-btn" id="modalOpen" href="#" target="_blank">Open</a>
          <a class="mini-btn" id="modalDownload" href="#" download>Download</a>
          <button class="mini-btn" id="modalReuse" type="button">Reuse Prompt</button>
          <button class="mini-btn" id="modalCopy" type="button">Copy Prompt</button>
        </div>
      </div>
    </div>

    <script>
      const form = document.querySelector("#form");
      const result = document.querySelector("#result");
      const historyPanel = document.querySelector("#historyPanel");
      const historyResize = document.querySelector("#historyResize");
      const history = document.querySelector("#history");
      const historyCount = document.querySelector("#historyCount");
      const selectAllHistory = document.querySelector("#selectAllHistory");
      const selectHistory = document.querySelector("#selectHistory");
      const downloadSelected = document.querySelector("#downloadSelected");
      const deleteSelected = document.querySelector("#deleteSelected");
      const statusBtn = document.querySelector("#status");
      const statusDot = document.querySelector("#statusDot");
      const statusText = document.querySelector("#statusText");
      const jobsPopover = document.querySelector("#jobsPopover");
      const refreshJobs = document.querySelector("#refreshJobs");
      const closeJobs = document.querySelector("#closeJobs");
      const jobList = document.querySelector("#jobList");
      const submit = document.querySelector("#submit");
      const promptInput = form.elements.prompt;
      const ratioGrid = document.querySelector("#ratioGrid");
      const qualitySeg = document.querySelector("#qualitySeg");
      const modal = document.querySelector("#modal");
      const modalImage = document.querySelector("#modalImage");
      const modalMeta = document.querySelector("#modalMeta");
      const modalPrompt = document.querySelector("#modalPrompt");
      const modalOpen = document.querySelector("#modalOpen");
      const modalDownload = document.querySelector("#modalDownload");
      const modalReuse = document.querySelector("#modalReuse");
      const modalCopy = document.querySelector("#modalCopy");
      const modalClose = document.querySelector("#modalClose");

      const sizeRatioMap = {
        "1024x1024": "1:1", "1536x2048": "3:4", "2048x1536": "4:3",
        "3360x1440": "21:9", "1024x1536": "2:3", "1536x1024": "3:2",
        "2160x3840": "9:16", "3840x2160": "16:9",
      };
      let activeHistoryRecord = null;
      let selectingHistory = false;
      let allHistoryRecords = [];
      let visibleHistoryRecords = [];
      const selectedHistoryIds = new Set();
      const backgroundJobs = new Map();
      let timer = null;
      let activePollToken = 0;
      let watchedJobId = null;
      let jobsRefreshTimer = null;
      const historyHeightKey = "imageCliHistoryHeight_v2";

      let selectedSize = "1024x1024";
      let selectedQuality = "auto";

      ratioGrid.addEventListener("click", (e) => {
        const btn = e.target.closest(".ratio-btn");
        if (!btn) return;
        ratioGrid.querySelectorAll(".ratio-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedSize = btn.dataset.value;
      });
      qualitySeg.addEventListener("click", (e) => {
        const btn = e.target.closest(".seg-btn");
        if (!btn) return;
        qualitySeg.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedQuality = btn.dataset.value;
      });

      function setStatus(text, mode = "idle") {
        statusText.textContent = text;
        statusDot.className = "status-dot" + (mode === "busy" ? " busy" : mode === "live" ? " live" : "");
      }
      function setBusy(msg) {
        let sec = 0;
        setStatus(`${msg} \u00b7 ${sec}s`, "busy");
        clearInterval(timer);
        timer = setInterval(() => { sec += 1; setStatus(`${msg} \u00b7 ${sec}s`, "busy"); }, 1000);
      }
      function stopBusy(msg) {
        clearInterval(timer); timer = null;
        setStatus(msg, backgroundJobs.size ? "live" : "idle");
      }
      function decorateStatus(msg) {
        const c = backgroundJobs.size;
        if (!c) return msg;
        if (!watchedJobId && (msg === "Ready" || msg === "Done")) return `${c} background job${c > 1 ? "s" : ""}`;
        return `${msg} / ${c} bg`;
      }
      function refreshIdleStatus() {
        if (!timer && !watchedJobId) setStatus(decorateStatus("Ready"), backgroundJobs.size ? "live" : "idle");
      }

      function formatError(data) {
        if (typeof data?.detail === "string") return data.detail;
        if (data?.detail) return JSON.stringify(data.detail, null, 2);
        return JSON.stringify(data || { error: "Failed" }, null, 2);
      }
      function formatDate(v) { return v ? new Date(v * 1000).toLocaleString() : ""; }
      function formatQuality(m = {}) {
        const r = m.requested_quality || m.quality || "";
        const a = m.actual_quality || m.quality || "";
        return (r || a) ? `q:${r || "-"}/${a || "-"}` : "";
      }
      function formatSize(v) { return v ? (sizeRatioMap[v] || v) : ""; }
      function promptPreview(job) {
        const t = (job.payload?.prompt || job.prompt || "no prompt");
        return t.length > 50 ? t.slice(0, 50) + "..." : t;
      }
      function clearPromptAfterSuccess(prompt) {
        if (promptInput.value === prompt) promptInput.value = "";
      }
      async function copyText(text) {
        try { await navigator.clipboard.writeText(text); } catch {
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.cssText = "position:fixed;left:-9999px";
          document.body.append(ta); ta.select(); document.execCommand("copy"); ta.remove();
        }
      }

      function clampHistoryH(h) {
        const min = 130, max = Math.max(min, (document.querySelector(".workspace")?.clientHeight || 700) - 300);
        return Math.min(max, Math.max(min, h));
      }
      function applyHistoryH(h) {
        const nh = clampHistoryH(h);
        document.querySelector(".workspace").style.setProperty("--history-h", nh + "px");
        localStorage.setItem(historyHeightKey, String(Math.round(nh)));
      }
      (function initResize() {
        const saved = parseInt(localStorage.getItem(historyHeightKey), 10);
        if (isFinite(saved)) applyHistoryH(saved);
        let startY = 0, startH = 0;
        const move = e => applyHistoryH(startH + startY - e.clientY);
        const stop = () => { document.body.style.cursor = ""; document.removeEventListener("pointermove", move); document.removeEventListener("pointerup", stop); };
        historyResize.addEventListener("pointerdown", e => {
          e.preventDefault(); startY = e.clientY; startH = historyPanel.getBoundingClientRect().height;
          document.body.style.cursor = "ns-resize";
          document.addEventListener("pointermove", move); document.addEventListener("pointerup", stop);
        });
        window.addEventListener("resize", () => applyHistoryH(historyPanel.getBoundingClientRect().height));
      })();

      function createImageCard(image, meta = {}) {
        const card = document.createElement("div");
        card.className = "result-card";
        const src = image.file || image.url;
        const img = document.createElement("img");
        img.src = src; img.alt = meta.prompt || "generated image";
        img.addEventListener("click", () => window.open(src, "_blank"));
        const footer = document.createElement("div");
        footer.className = "result-card-footer";
        const metaEl = document.createElement("div");
        metaEl.className = "result-card-meta";
        metaEl.textContent = [formatSize(meta.size), formatQuality(meta)].filter(Boolean).join(" \u00b7 ");
        const actions = document.createElement("div");
        actions.className = "result-card-actions";
        const openBtn = document.createElement("a");
        openBtn.className = "mini-btn"; openBtn.href = src; openBtn.target = "_blank"; openBtn.textContent = "Open";
        const dlBtn = document.createElement("a");
        dlBtn.className = "mini-btn"; dlBtn.href = src; dlBtn.download = src.split("/").pop() || "image.png"; dlBtn.textContent = "Save";
        actions.append(openBtn, dlBtn);
        footer.append(metaEl, actions);
        card.append(img, footer);
        card.style.animationDelay = `${Math.random() * 0.12}s`;
        return card;
      }

      function createHistoryRow(record) {
        const row = document.createElement("div");
        row.className = "history-row";
        const check = document.createElement("input");
        check.type = "checkbox"; check.className = "history-check"; check.dataset.historyId = record.id;
        check.checked = selectedHistoryIds.has(record.id);
        check.addEventListener("click", e => {
          e.stopPropagation();
          check.checked ? selectedHistoryIds.add(record.id) : selectedHistoryIds.delete(record.id);
          updateSelectionUi();
        });
        const info = document.createElement("div"); info.className = "history-info";
        const prompt = document.createElement("div"); prompt.className = "history-prompt";
        prompt.textContent = record.prompt || "history image";
        const detail = document.createElement("div"); detail.className = "history-detail";
        detail.textContent = [formatSize(record.size), formatQuality(record), formatDate(record.created_at)].filter(Boolean).join(" \u00b7 ");
        info.append(prompt, detail);
        const view = document.createElement("button"); view.className = "history-view"; view.type = "button"; view.textContent = "View";
        row.append(check, info, view);
        row.addEventListener("click", () => {
          if (selectingHistory) { check.checked = !check.checked; check.checked ? selectedHistoryIds.add(record.id) : selectedHistoryIds.delete(record.id); updateSelectionUi(); return; }
          openModal(record);
        });
        return row;
      }
      function renderHistory(records) {
        visibleHistoryRecords = records.filter(r => !r.operation || r.operation === "generate");
        historyCount.textContent = `${visibleHistoryRecords.length}`;
        if (!visibleHistoryRecords.length) {
          history.replaceChildren(Object.assign(document.createElement("div"), { className: "empty-state", style: "min-height:40px;font-size:11px;", textContent: "No history yet" }));
          updateSelectionUi(); return;
        }
        history.replaceChildren(...visibleHistoryRecords.map(r => createHistoryRow(r)));
        updateSelectionUi();
      }
      async function loadHistory() {
        try {
          const res = await fetch("/v1/history");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          allHistoryRecords = data.images || [];
          renderHistory(allHistoryRecords);
        } catch (e) {
          historyCount.textContent = "!";
          history.replaceChildren(Object.assign(document.createElement("div"), { className: "error-box", textContent: `History load failed: ${e.message}` }));
        }
      }
      function updateSelectionUi() {
        const ids = visibleHistoryRecords.map(r => r.id).filter(Boolean);
        const allSel = ids.length > 0 && ids.every(id => selectedHistoryIds.has(id));
        history.classList.toggle("selecting", selectingHistory);
        selectHistory.textContent = selectingHistory ? "Cancel" : "Select";
        selectAllHistory.hidden = !selectingHistory;
        selectAllHistory.textContent = allSel ? "Deselect All" : "Select All";
        downloadSelected.hidden = !selectingHistory || !selectedHistoryIds.size;
        deleteSelected.hidden = !selectingHistory || !selectedHistoryIds.size;
        downloadSelected.textContent = `Download${selectedHistoryIds.size ? ` (${selectedHistoryIds.size})` : ""}`;
        deleteSelected.textContent = `Delete${selectedHistoryIds.size ? ` (${selectedHistoryIds.size})` : ""}`;
      }
      selectHistory.addEventListener("click", () => {
        selectingHistory = !selectingHistory; selectedHistoryIds.clear();
        history.querySelectorAll(".history-check").forEach(c => c.checked = false);
        updateSelectionUi();
      });
      selectAllHistory.addEventListener("click", () => {
        const ids = visibleHistoryRecords.map(r => r.id).filter(Boolean);
        const allSel = ids.length > 0 && ids.every(id => selectedHistoryIds.has(id));
        if (allSel) ids.forEach(id => selectedHistoryIds.delete(id));
        else ids.forEach(id => selectedHistoryIds.add(id));
        history.querySelectorAll(".history-check").forEach(c => c.checked = selectedHistoryIds.has(c.dataset.historyId));
        updateSelectionUi();
      });
      downloadSelected.addEventListener("click", async () => {
        if (!selectedHistoryIds.size) return;
        const res = await fetch("/v1/history/download", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ids: [...selectedHistoryIds] }) });
        if (!res.ok) { alert(`Download failed: HTTP ${res.status}`); return; }
        const blob = await res.blob(); const url = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement("a"), { href: url, download: "history-images.zip" });
        document.body.append(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      });
      deleteSelected.addEventListener("click", async () => {
        if (!selectedHistoryIds.size) return;
        if (!confirm(`Delete ${selectedHistoryIds.size} selected items? Local files will be removed.`)) return;
        const res = await fetch("/v1/history/delete", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ids: [...selectedHistoryIds] }) });
        if (!res.ok) { alert(`Delete failed: HTTP ${res.status}`); return; }
        selectingHistory = false; selectedHistoryIds.clear(); await loadHistory();
      });

      async function openModal(record) {
        modalPrompt.textContent = "Loading...";
        modalMeta.textContent = [formatSize(record.size), formatQuality(record), formatDate(record.created_at)].filter(Boolean).join(" \u00b7 ");
        modal.hidden = false;
        const res = await fetch(`/v1/history/${record.id}`);
        if (!res.ok) { modalPrompt.textContent = `Load failed: HTTP ${res.status}`; return; }
        const detail = await res.json();
        const src = detail.file || detail.url;
        if (!src) { modalPrompt.textContent = "No image URL"; return; }
        record = detail; activeHistoryRecord = record;
        modalImage.src = src; modalImage.alt = record.prompt || "history image";
        modalMeta.textContent = [formatSize(record.size), formatQuality(record), formatDate(record.created_at)].filter(Boolean).join(" \u00b7 ");
        modalPrompt.textContent = record.prompt || "No prompt";
        modalOpen.href = src; modalDownload.href = src; modalDownload.download = src.split("/").pop() || "image.png";
      }
      function closeModal() { modal.hidden = true; modalImage.removeAttribute("src"); activeHistoryRecord = null; }
      modalClose.addEventListener("click", closeModal);
      modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
      modalReuse.addEventListener("click", () => { if (!activeHistoryRecord) return; promptInput.value = activeHistoryRecord.prompt || ""; promptInput.focus(); closeModal(); });
      modalCopy.addEventListener("click", async () => {
        if (!activeHistoryRecord) return;
        await copyText(activeHistoryRecord.prompt || "");
        const orig = modalCopy.textContent; modalCopy.textContent = "Copied!";
        setTimeout(() => modalCopy.textContent = orig, 1200);
      });
      window.addEventListener("keydown", e => { if (e.key === "Escape" && !modal.hidden) closeModal(); });

      function isActiveJob(j) { return j?.status === "queued" || j?.status === "running"; }
      function bodyFromJob(j) { const p = j.payload || {}; return { prompt: j.prompt || p.prompt || "", size: p.size || "", quality: p.quality || "auto", n: p.n || 1 }; }
      function renderJobsPopover() {
        const jobs = [...backgroundJobs.values()].filter(isActiveJob);
        backgroundJobs.clear(); jobs.forEach(j => backgroundJobs.set(j.id, j));
        if (!jobs.length) {
          jobList.replaceChildren(Object.assign(document.createElement("div"), { className: "empty-state", style: "min-height:50px;font-size:11px;", textContent: "No active jobs" }));
          refreshIdleStatus(); return;
        }
        const nodes = jobs.map(job => {
          const item = document.createElement("div"); item.className = "job-item"; item.tabIndex = 0;
          const meta = document.createElement("div"); meta.className = "job-meta";
          const prompt = document.createElement("div"); prompt.className = "job-prompt"; prompt.textContent = promptPreview(job);
          const detail = document.createElement("div"); detail.className = "job-detail";
          detail.textContent = [formatSize(bodyFromJob(job).size), bodyFromJob(job).quality, job.id.slice(0, 8)].join(" \u00b7 ");
          meta.append(prompt, detail);
          const side = document.createElement("div"); side.className = "job-side";
          const status = document.createElement("span"); status.className = `job-status ${job.status}`; status.textContent = job.status;
          const cancel = document.createElement("button"); cancel.className = "job-cancel"; cancel.type = "button"; cancel.textContent = "\u00d7";
          cancel.addEventListener("click", e => { e.stopPropagation(); cancelBgJob(job); });
          side.append(status, cancel);
          item.append(meta, side);
          item.addEventListener("click", () => enterJob(job));
          return item;
        });
        jobList.replaceChildren(...nodes);
        refreshIdleStatus();
      }
      async function cancelBgJob(job) {
        try { await fetch(`/v1/jobs/${job.id}/cancel`, { method: "POST" }); }
        finally { backgroundJobs.delete(job.id); renderJobsPopover(); await loadHistory(); }
      }
      function rememberBgJob(job) { if (!isActiveJob(job) || job.id === watchedJobId) return; backgroundJobs.set(job.id, job); renderJobsPopover(); }
      async function refreshBgJobs() {
        try {
          const res = await fetch("/v1/jobs"); if (!res.ok) return;
          const data = await res.json();
          const active = (data.jobs || []).filter(isActiveJob);
          const activeIds = new Set(active.map(j => j.id));
          for (const id of [...backgroundJobs.keys()]) {
            if (!activeIds.has(id)) { backgroundJobs.delete(id); const fj = (data.jobs || []).find(j => j.id === id); if (fj) await showBgFinal(fj); }
          }
          active.forEach(j => { if (j.id !== watchedJobId) backgroundJobs.set(j.id, j); });
          renderJobsPopover();
        } catch {}
      }
      function toggleJobsPopover() {
        jobsPopover.hidden = !jobsPopover.hidden;
        if (!jobsPopover.hidden) {
          renderJobsPopover();
          refreshBgJobs();
        }
      }
      statusBtn.addEventListener("click", toggleJobsPopover);
      refreshJobs.addEventListener("click", refreshBgJobs);
      closeJobs.addEventListener("click", () => jobsPopover.hidden = true);
      document.addEventListener("click", e => {
        if (jobsPopover.hidden) return;
        if (statusBtn.contains(e.target) || jobsPopover.contains(e.target)) return;
        jobsPopover.hidden = true;
      });

      function showBgNotice(job) {
        const notice = document.createElement("div");
        notice.className = "empty-state";
        notice.dataset.backgroundJobId = job.id;
        notice.innerHTML = `<div style="display:grid;gap:6px;justify-items:center;"><div style="font-size:13px;color:var(--text-secondary);">Job moved to background</div><div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">${job.id}</div><div style="font-size:11px;color:var(--text-muted);">You can submit new prompts. History will refresh when done.</div></div>`;
        result.replaceChildren(notice);
      }
      async function showBgFinal(job) {
        const cur = result.querySelector("[data-background-job-id]");
        if (cur?.dataset.backgroundJobId !== job.id) return false;
        if (job.status === "succeeded") {
          const body = bodyFromJob(job), data = job.result;
          const meta = { prompt: body.prompt, size: body.size, quality: data?.provider_response?.quality || body.quality };
          const imgs = (data?.images || []).filter(i => i.file || i.url).map(i => createImageCard(i, meta));
          stopBusy(`${imgs.length} image${imgs.length === 1 ? "" : "s"}`);
          result.replaceChildren(...imgs); clearPromptAfterSuccess(body.prompt); return true;
        }
        if (job.status === "failed") {
          stopBusy("Failed");
          result.replaceChildren(Object.assign(document.createElement("div"), { className: "error-box", textContent: `Job failed (${job.status_code || 500}):\n${JSON.stringify(job.error || job, null, 2)}` }));
          return true;
        }
        if (job.status === "cancelled") { stopBusy("Cancelled"); return true; }
        return false;
      }
      async function pollBgJob(jobId) {
        let polls = 0;
        while (backgroundJobs.has(jobId)) {
          await new Promise(r => setTimeout(r, polls < 6 ? 5000 : 10000)); polls++;
          try {
            const res = await fetch(`/v1/jobs/${jobId}`); if (!res.ok) continue;
            const job = await res.json();
            if (isActiveJob(job)) { if (job.id !== watchedJobId) backgroundJobs.set(job.id, job); renderJobsPopover(); continue; }
            backgroundJobs.delete(jobId); renderJobsPopover(); await loadHistory();
            const shown = await showBgFinal(job);
            if (job.status === "succeeded") clearPromptAfterSuccess(bodyFromJob(job).prompt);
            if (!watchedJobId && !shown) stopBusy(decorateStatus("Done"));
            return;
          } catch { continue; }
        }
      }
      function moveJobToBg(job) {
        activePollToken++; watchedJobId = null; submit.disabled = false;
        if (!backgroundJobs.has(job.id)) { backgroundJobs.set(job.id, job); pollBgJob(job.id); }
        jobsPopover.hidden = false;
        renderJobsPopover();
        refreshBgJobs();
        stopBusy(decorateStatus("Ready"));
        showBgNotice(job);
      }

      function enterJob(job) {
        backgroundJobs.delete(job.id); renderJobsPopover(); jobsPopover.hidden = true;
        const token = ++activePollToken; watchedJobId = job.id; submit.disabled = true;
        setBusy("Generating"); showJobState(job, bodyFromJob(job), token); pollJob(job.id, bodyFromJob(job), token);
      }
      function showJobState(job, body, token) {
        const canCancel = job.status === "queued" || job.status === "running";
        const wrap = document.createElement("div");
        wrap.className = "loader-state";
        wrap.innerHTML = `
          ${canCancel ? '<div class="spinner"></div>' : ""}
          <div class="loader-text">Job ${job.status}</div>
          <div class="loader-sub">${job.id}</div>
          ${canCancel ? '<div class="inline-actions"><button class="mini-btn" data-act="bg" type="button">Background</button><button class="mini-btn" data-act="cancel" type="button" style="border-color:var(--danger-border);color:var(--danger);">Cancel</button></div>' : ""}
        `;
        if (canCancel) {
          wrap.querySelector('[data-act="bg"]').addEventListener("click", () => moveJobToBg(job));
          wrap.querySelector('[data-act="cancel"]').addEventListener("click", async () => {
            await fetch(`/v1/jobs/${job.id}/cancel`, { method: "POST" });
            if (token !== activePollToken) return;
            stopBusy("Cancelled"); submit.disabled = false; watchedJobId = null;
            await pollJob(job.id, body, token);
          });
        }
        result.replaceChildren(wrap);
      }
      async function pollJob(jobId, body, token) {
        let polls = 0;
        while (true) {
          if (token !== activePollToken) return;
          const res = await fetch(`/v1/jobs/${jobId}`); polls++;
          const job = await res.json();
          if (token !== activePollToken) return;
          if (!res.ok) {
            stopBusy("Failed"); submit.disabled = false; watchedJobId = null;
            result.replaceChildren(Object.assign(document.createElement("div"), { className: "error-box", textContent: `Job query failed (${res.status}):\n${formatError(job)}` }));
            return;
          }
          if (job.status === "queued" || job.status === "running") {
            showJobState(job, body, token);
            const delay = polls < 5 ? 2000 : polls < 9 ? 5000 : 10000;
            await new Promise(r => setTimeout(r, delay)); continue;
          }
          backgroundJobs.delete(jobId); renderJobsPopover(); submit.disabled = false; watchedJobId = null;
          if (job.status === "cancelled") {
            stopBusy("Cancelled");
            result.replaceChildren(Object.assign(document.createElement("div"), { className: "empty-state", textContent: "Generation cancelled." }));
            return;
          }
          if (job.status === "failed") {
            stopBusy("Failed");
            result.replaceChildren(Object.assign(document.createElement("div"), { className: "error-box", textContent: `Generation failed (${job.status_code || 500}):\n${JSON.stringify(job.error || job, null, 2)}` }));
            return;
          }
          const data = job.result;
          const meta = { prompt: body.prompt, size: body.size, quality: data?.provider_response?.quality || body.quality };
          const imgs = (data?.images || []).filter(i => i.file || i.url).map(i => createImageCard(i, meta));
          stopBusy(`${imgs.length} image${imgs.length === 1 ? "" : "s"}`);
          result.replaceChildren(...imgs);
          await loadHistory(); clearPromptAfterSuccess(body.prompt);
          return;
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = ++activePollToken; watchedJobId = null;
        setBusy("Generating"); submit.disabled = true;
        result.replaceChildren(Object.assign(document.createElement("div"), {
          className: "loader-state",
          innerHTML: '<div class="spinner"></div><div class="loader-text">Generating...</div><div class="loader-sub">4K or complex prompts may take a few minutes</div>'
        }));
        const count = Math.min(10, Math.max(1, parseInt(form.querySelector('[name="n"]').value, 10) || 1));
        const body = { prompt: promptInput.value, size: selectedSize, quality: selectedQuality, n: count };
        let res, data;
        try {
          res = await fetch("/v1/jobs", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
          data = await res.json();
        } catch (err) {
          stopBusy("Failed"); submit.disabled = false; watchedJobId = null;
          result.replaceChildren(Object.assign(document.createElement("div"), { className: "error-box", textContent: `Request failed: ${err.message}` }));
          return;
        }
        if (!res.ok) {
          stopBusy("Failed"); submit.disabled = false; watchedJobId = null;
          result.replaceChildren(Object.assign(document.createElement("div"), { className: "error-box", textContent: `Generation failed (${res.status}):\n${formatError(data)}` }));
          return;
        }
        watchedJobId = data.id; backgroundJobs.delete(data.id); renderJobsPopover();
        showJobState(data, body, token); await pollJob(data.id, body, token);
      });

      async function resumeActiveJob() {
        const res = await fetch("/v1/jobs"); if (!res.ok) return;
        const data = await res.json();
        (data.jobs || []).filter(isActiveJob).forEach(j => backgroundJobs.set(j.id, j));
        const active = (data.jobs || []).find(j => j.status === "queued" || j.status === "running");
        if (!active) { renderJobsPopover(); return; }
        backgroundJobs.delete(active.id); renderJobsPopover();
        const p = active.payload || {};
        const body = { prompt: active.prompt || p.prompt || "", size: p.size || "", quality: p.quality || "auto", n: p.n || 1 };
        const token = ++activePollToken; watchedJobId = active.id; setBusy("Generating"); submit.disabled = true;
        showJobState(active, body, token); await pollJob(active.id, body, token);
      }

      loadHistory(); resumeActiveJob(); refreshBgJobs();
      jobsRefreshTimer = setInterval(refreshBgJobs, 10000);
    </script>
  </body>
</html>
