<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f2f4f7;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f2f4f7; }
      form {
        width: min(390px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
        border: 1px solid #d8dee9;
        border-radius: 10px;
        background: #ffffff;
        padding: 24px;
      }
      h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
      p { margin: 0; color: #566176; font-size: 14px; }
      label { display: grid; gap: 8px; color: #344054; font-size: 13px; font-weight: 800; }
      input {
        width: 100%;
        border: 1px solid #c9d2df;
        border-radius: 8px;
        padding: 12px;
        font: inherit;
        outline: none;
      }
      input:focus { border-color: #165dcc; box-shadow: 0 0 0 3px rgba(22, 93, 204, 0.12); }
      button {
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        background: #165dcc;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }
      #error { min-height: 20px; color: #9f1239; font-size: 13px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <form id="form">
      <div>
        <h1>gpt-image-2</h1>
        <p>输入密码继续使用图片生成服务</p>
      </div>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" autofocus required />
      </label>
      <button type="submit">登录</button>
      <div id="error"></div>
    </form>
    <script>
      const form = document.querySelector("#form");
      const error = document.querySelector("#error");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        const body = Object.fromEntries(new FormData(form).entries());
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        if (response.ok) {
          window.location.href = "/";
          return;
        }
        const data = await response.json().catch(() => ({}));
        error.textContent = data.detail || "登录失败";
      });
    </script>
  </body>
</html>
